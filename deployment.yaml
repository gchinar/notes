```yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-api
  # COMMENT: Replace with your actual app name
  # This should match the name used in your ArgoCD application and service
  namespace: stg
  # COMMENT: Confirm your STG namespace
  # Run on colleague's setup or check ArgoCD UI: Applications → your app → namespace
  labels:
    app: myapp-api
spec:
  replicas: 2
  # COMMENT: Check current replica count in the existing STG deployment
  # Look at the GitOps repo overlay for STG, or ArgoCD UI → your app → Deployment → replicas
  selector:
    matchLabels:
      app: myapp-api
  template:
    metadata:
      labels:
        app: myapp-api
    spec:
      serviceAccountName: myapp-api-sa
      # COMMENT: Check if a service account already exists for this app in the GitOps repo
      # Only needed if the app calls AWS services (S3, SQS, Secrets Manager, etc.)
      # To check: grep -RinE 's3|sns|sqs|ses|secretsmanager|ssm|dynamodb' . (from app repo root)
      # If no AWS access needed, remove this line

      nodeSelector:
        kubernetes.io/arch: arm64
        # COMMENT: Since your EKS has mixed nodes and your image is arm64,
        # this ensures pods land on Graviton nodes
        # If using amd64 image instead, change to: kubernetes.io/arch: amd64

      containers:
        - name: myapp-api
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/<ECR_REPO_NAME>:<IMAGE_TAG>
          # COMMENT: Get these values:
          # AWS_ACCOUNT_ID → Run: aws sts get-caller-identity --query Account --output text
          # AWS_REGION     → Check your ECR console or run: aws configure get region
          # ECR_REPO_NAME  → Check ECR console → Repositories → your repo name
          # IMAGE_TAG      → Check ECR console → your repo → Images → latest pushed tag
          #                   Or use the git SHA from your last successful workflow run

          ports:
            - containerPort: 8080
              # COMMENT: Confirm the port your app listens on
              # SSH into EC2 and run: sudo ss -ltnp | grep java
              # Or check application.properties/yml for server.port
              # If app runs on port 80 behind Tomcat, Tomcat default is 8080

          env:
            # ──────────────────────────────────────────────
            # SPRING PROFILE
            # ──────────────────────────────────────────────
            - name: SPRING_PROFILES_ACTIVE
              value: "stg"
              # COMMENT: Check the active profile on EC2
              # Run: sudo strings /proc/$(pgrep -f 'java' | head -1)/environ | grep SPRING_PROFILES
              # Or check systemd: systemctl cat <SERVICE_NAME> | grep profile
              # Or check startup command: pgrep -a java (look for --spring.profiles.active=)

            # ──────────────────────────────────────────────
            # JAVA / JVM OPTIONS (if needed)
            # ──────────────────────────────────────────────
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m"
              # COMMENT: Check current JVM settings on EC2
              # Run: pgrep -a java (look for -Xms, -Xmx, -XX: flags)
              # If no custom JVM flags are used on EC2, remove this block

            # ──────────────────────────────────────────────
            # DATABASE SECRETS
            # ──────────────────────────────────────────────
            # COMMENT: The following secret keys come from your migration.txt
            # You need to create a Kubernetes Secret with these values first
            # To find actual values on EC2, run:
            #   sudo strings /proc/$(pgrep -f 'java' | head -1)/environ | sort | \
            #     egrep 'DB_|DATABASE|JDBC|MYSQL|POSTGRES|ORACLE|REDSHIFT|USER|PASS|HOST|URL'
            # Also check: application.properties or application.yml in the code repo
            #   grep -RinE 'spring.datasource|jdbc:|dbHost|dbUser|dbPass' .

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: myapp-api-secret
                  key: username
                  # COMMENT: Check the exact key name your app expects
                  # Search code: grep -RinE 'username|DB_USER|spring.datasource.username' .

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myapp-api-secret
                  key: password
                  # COMMENT: Check the exact key name your app expects
                  # Search code: grep -RinE 'password|DB_PASS|spring.datasource.password' .

            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: myapp-api-secret
                  key: dbHostGeneral
                  # COMMENT: Check EC2 for the actual DB host value
                  # Run: sudo strings /proc/$(pgrep -f 'java' | head -1)/environ | grep -i dbhost
                  # Also verify EKS can reach this host (security groups, subnets)

            - name: DB_CLUSTER_IDENTIFIER
              valueFrom:
                secretKeyRef:
                  name: myapp-api-secret
                  key: dbClusterIdentifierGeneral
                  # COMMENT: Check if your app actually uses this
                  # Search code: grep -RinE 'clusterIdentifier|cluster' .
                  # If not used, remove this block

            # ──────────────────────────────────────────────
            # REDSHIFT SECRETS (if app uses Redshift)
            # ──────────────────────────────────────────────
            # COMMENT: Only include these if your app connects to Redshift
            # Check code: grep -RinE 'redshift|redShift' .
            # Check EC2: sudo strings /proc/$(pgrep -f 'java' | head -1)/environ | grep -i redshift
            # If no Redshift usage found, remove this entire block

            - name: REDSHIFT_USER
              valueFrom:
                secretKeyRef:
                  name: myapp-api-secret
                  key: redShiftUser

            - name: REDSHIFT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myapp-api-secret
                  key: redShiftPassword

            - name: REDSHIFT_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: myapp-api-secret
                  key: redShiftEndpoint

            # ──────────────────────────────────────────────
            # ADDITIONAL ENV VARS
            # ──────────────────────────────────────────────
            # COMMENT: Discover ALL env vars the app needs on EC2:
            #   sudo strings /proc/$(pgrep -f 'java' | head -1)/environ | sort
            # Filter useful ones:
            #   sudo strings /proc/$(pgrep -f 'java' | head -1)/environ | sort | \
            #     egrep 'SPRING|DB_|REDIS|KAFKA|RABBIT|AWS_|S3_|SECRET|TOKEN|API|URL|HOST|PORT'
            # Add each one here as either:
            #   - plain value (for non-secrets like URLs, ports, feature flags)
            #   - secretKeyRef (for passwords, tokens, keys)

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
            # COMMENT: Check current resource usage on EC2
            # Run: top -p $(pgrep -f 'java' | head -1)
            # Or: ps -o pid,rss,vsz,pcpu -p $(pgrep -f 'java' | head -1)
            # rss = actual memory in KB, divide by 1024 for MB
            # Set requests to typical usage, limits to peak usage
            # If unsure, start with these defaults and adjust after monitoring

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              # COMMENT: Check if your app has Spring Actuator enabled
              # Search code: grep -RinE 'actuator|health' .
              # If actuator is in pom.xml, /actuator/health likely works
              # If not, try a known endpoint like / or /api/health
              # Test on EC2: curl -s http://localhost:8080/actuator/health
            initialDelaySeconds: 60
            # COMMENT: Spring Boot + Tomcat WAR apps can take time to start
            # If the app takes longer, increase this (check EC2 startup logs)
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              # COMMENT: Same path as readinessProbe usually works
            initialDelaySeconds: 90
            # COMMENT: Should be higher than readinessProbe initialDelaySeconds
            # So the app has time to start before liveness kills it
            periodSeconds: 15
            failureThreshold: 3

      # ──────────────────────────────────────────────
      # IMAGE PULL SECRET (if ECR needs auth from cluster)
      # ──────────────────────────────────────────────
      # imagePullSecrets:
      #   - name: ecr-pull-secret
      # COMMENT: Check if your EKS cluster already has ECR access
      # If nodes have the AmazonEC2ContainerRegistryReadOnly IAM policy, this is not needed
      # Check existing deployments in ArgoCD — if they pull from ECR without this, skip it
```

Every `COMMENT` tells you either a command to run on EC2 or a place to check in the code/GitOps repo. Start with the big env var discovery command on EC2 — that'll reveal most of what you need to fill in.
